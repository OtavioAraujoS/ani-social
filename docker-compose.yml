services:
  postgres-db:
    image: postgres:18.3-alpine
    container_name: elysia_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d my_elysia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
